<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>
  <body>

    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item">
      <button>Add item</button>
    </form>

    <ul>

    </ul>

    <script>
        //2
        const list = document.querySelector("ul");
        const input = document.querySelector("input");
        const btn = document.querySelector("button");

        //3 & 4
        btn.addEventListener("click", function(event) {
            event.preventDefault();

            //5
            const inputStore = document.querySelector("input").value;

            //6
            input.value = "";

            //7
            const inputList = document.createElement("li");
            const inputSpan = document.createElement("span");
            const inputBtn = document.createElement("button");

            //8
            inputList.appendChild(inputSpan);
            inputList.appendChild(inputBtn);

            //9
            inputSpan.textContent = inputStore;
            inputBtn.textContent = "Delete";

            //10
            list.appendChild(inputList);

            //11
            inputBtn.addEventListener("click", function(event) {
              list.removeChild(inputList);
            })

            //12
            input.focus();

        });
    </script>
  </body>
</html>
